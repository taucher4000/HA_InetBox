name: "Inetbox"
description: "Truma iNet box for controlling the Truma Combi heater"
version: "0.0.1"
slug: "inet_box"
init: false
uart: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

options:
  MQTTBroker: "core-mosquitto"
  MQTTUser: ""
  MQTTPassword: ""
  SerialDevice: "/dev/serial0"
  DefaultTargetTempRoom: 22
  DebugMode: false

schema:
  MQTTBroker: str
  MQTTUser: str?
  MQTTPassword: password?
  SerialDevice: str
  DefaultTargetTempRoom: int
  DebugMode: bool
